name: Deploy

on:
  push:
    branches:
      - main
      - '2.0'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build and deploy (main / 2.0)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - id: detect
        name: Detect publish dir
        run: |
          if [ -d build ]; then echo "publish_dir=build" >> $GITHUB_OUTPUT
          elif [ -d dist ]; then echo "publish_dir=dist" >> $GITHUB_OUTPUT
          else
            echo "publish_dir=build" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.detect.outputs.publish_dir }}